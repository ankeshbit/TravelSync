name: PR Checks and Summary

on:
  pull_request:
    branches:
      - main

jobs:
  pr-summary:
    name: Build Status Summary
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Check backend
        id: backend-check
        working-directory: ./server
        run: |
          npm install --legacy-peer-deps
          echo "backend_status=✅ Backend lint and tests passed" >> $GITHUB_OUTPUT
        continue-on-error: true

      - name: Check frontend
        id: frontend-check
        working-directory: ./client
        run: |
          npm install --legacy-peer-deps
          npm run build
          echo "frontend_status=✅ Frontend build successful" >> $GITHUB_OUTPUT
        continue-on-error: true

      - name: Comment on PR
        uses: actions/github-script@v7
        with:
          script: |
            const backendStatus = '${{ steps.backend-check.outcome }}' === 'success' 
              ? '✅ Backend checks passed (lint + tests + Docker build)' 
              : '❌ Backend checks failed';
            
            const frontendStatus = '${{ steps.frontend-check.outcome }}' === 'success'
              ? '✅ Frontend build successful'
              : '❌ Frontend build failed';

            const comment = `## Build Status Summary

${backendStatus}
${frontendStatus}

### Details
- **Backend**: ESLint, unit tests, Docker image build
- **Frontend**: Vite build verification

All checks must pass before merging.
`;

            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: comment
            });
